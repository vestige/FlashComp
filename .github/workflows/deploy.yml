# .github/workflows/deploy.yml
name: Deploy to GitHub Pages
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_env:
        description: "deploy target"
        type: choice
        required: true
        default: "prod"
        options:
          - prod
          - demo
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm ci
      - name: Resolve target environment
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env_name=${{ github.event.inputs.target_env }}" >> "$GITHUB_OUTPUT"
          else
            echo "env_name=prod" >> "$GITHUB_OUTPUT"
          fi
      - name: Load Firebase config for target env
        run: |
          TARGET="${{ steps.target.outputs.env_name }}"

          if [ "$TARGET" = "demo" ]; then
            API_KEY="${{ secrets.VITE_FIREBASE_API_KEY_DEMO }}"
            AUTH_DOMAIN="${{ secrets.VITE_FIREBASE_AUTH_DOMAIN_DEMO }}"
            PROJECT_ID="${{ secrets.VITE_FIREBASE_PROJECT_ID_DEMO }}"
            STORAGE_BUCKET="${{ secrets.VITE_FIREBASE_STORAGE_BUCKET_DEMO }}"
            MESSAGING_SENDER_ID="${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID_DEMO }}"
            APP_ID="${{ secrets.VITE_FIREBASE_APP_ID_DEMO }}"
          else
            API_KEY="${{ secrets.VITE_FIREBASE_API_KEY_PROD }}"
            AUTH_DOMAIN="${{ secrets.VITE_FIREBASE_AUTH_DOMAIN_PROD }}"
            PROJECT_ID="${{ secrets.VITE_FIREBASE_PROJECT_ID_PROD }}"
            STORAGE_BUCKET="${{ secrets.VITE_FIREBASE_STORAGE_BUCKET_PROD }}"
            MESSAGING_SENDER_ID="${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID_PROD }}"
            APP_ID="${{ secrets.VITE_FIREBASE_APP_ID_PROD }}"

            if [ -z "$API_KEY" ]; then
              API_KEY="${{ secrets.VITE_FIREBASE_API_KEY }}"
              AUTH_DOMAIN="${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}"
              PROJECT_ID="${{ secrets.VITE_FIREBASE_PROJECT_ID }}"
              STORAGE_BUCKET="${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}"
              MESSAGING_SENDER_ID="${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}"
              APP_ID="${{ secrets.VITE_FIREBASE_APP_ID }}"
            fi
          fi

          if [ -z "${API_KEY}" ] || [ -z "${AUTH_DOMAIN}" ] || [ -z "${PROJECT_ID}" ] || [ -z "${STORAGE_BUCKET}" ] || [ -z "${MESSAGING_SENDER_ID}" ] || [ -z "${APP_ID}" ]; then
            echo "::error::Missing Firebase env vars for target_env=$TARGET"
            exit 1
          fi

          {
            echo "VITE_FIREBASE_API_KEY=$API_KEY"
            echo "VITE_FIREBASE_AUTH_DOMAIN=$AUTH_DOMAIN"
            echo "VITE_FIREBASE_PROJECT_ID=$PROJECT_ID"
            echo "VITE_FIREBASE_STORAGE_BUCKET=$STORAGE_BUCKET"
            echo "VITE_FIREBASE_MESSAGING_SENDER_ID=$MESSAGING_SENDER_ID"
            echo "VITE_FIREBASE_APP_ID=$APP_ID"
          } >> "$GITHUB_ENV"
      - name: Build project
        run: npm run build:${{ steps.target.outputs.env_name }}
      - name: Deploy to GitHub Pages (production)
        if: steps.target.outputs.env_name == 'prod'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true
      - name: Deploy to GitHub Pages (demo)
        if: steps.target.outputs.env_name == 'demo'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: demo
          keep_files: true
