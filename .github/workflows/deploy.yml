# .github/workflows/deploy.yml
name: Deploy to GitHub Pages
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_env:
        description: "deploy target"
        required: true
        default: "prod"
        type: choice
        options:
          - prod
          - stg
          - demo
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm ci
      - name: Resolve target environment
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env_name=${{ github.event.inputs.target_env }}" >> "$GITHUB_OUTPUT"
          else
            echo "env_name=prod" >> "$GITHUB_OUTPUT"
          fi
      - name: Build project
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build:${{ steps.target.outputs.env_name }}
      - name: Deploy to GitHub Pages (production)
        if: steps.target.outputs.env_name == 'prod'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
      - name: Deploy to GitHub Pages (staging)
        if: steps.target.outputs.env_name == 'stg'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: stg
          keep_files: true
      - name: Deploy to GitHub Pages (demo)
        if: steps.target.outputs.env_name == 'demo'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: demo
          keep_files: true
